{% load i18n %}
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
  .container { max-width: 600px; margin: 24px auto; background: #fff; border-radius: 8px; overflow: hidden; }
  .header { background: #2e7d32; color: #fff; padding: 24px; }
  .body { padding: 24px; }
  .footer { background: #f4f4f4; padding: 16px; text-align: center; font-size: 12px; color: #888; }
  .btn { display: inline-block; background: #2e7d32; color: #fff; padding: 10px 20px;
         border-radius: 6px; text-decoration: none; margin-top: 16px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2 style="margin:0">🌾 AgriPredict</h2>
    <p style="margin:4px 0 0; opacity:0.85; font-size:14px">Gujarat Agriculture Admission Predictor</p>
  </div>
  <div class="body">
    <h3 style="color:#2e7d32">{{ title }}</h3>
    <p>{{ summary }}</p>
    {% if pdf_url %}
    <a href="{{ pdf_url }}" class="btn">View PDF Notification</a>
    {% endif %}
    <p style="margin-top:24px; color:#555; font-size:13px">
      Visit <a href="https://gajera06.pythonanywhere.com">AgriPredict</a> for full details.
    </p>
  </div>
  <div class="footer">
    You received this because you opted in to AgriPredict notifications.<br />
    <a href="{% url 'accounts:profile' %}">Manage preferences</a>
  </div>
</div>
</body>
</html>
