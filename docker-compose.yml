services:
  chatbot:
    image: agripredict-chatbot
    build: ./chatbot_api
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./chatbot_api/data:/app/data

  django:
    image: agripredict-django
    build: ./django_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - chatbot
      - redis
    environment:
      - CHATBOT_API_URL=http://chatbot:8001
    volumes:
      - ./django_app:/app                      # ← code stays live
      - ./db.sqlite3:/app/db.sqlite3           # ← database persists on your PC

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"