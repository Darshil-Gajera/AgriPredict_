services:
  chatbot:
    image: agripredict-chatbot
    build:
      context: ./chatbot_api
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./chatbot_api/data:/app/data

  django:
    image: agripredict-django
    build:
      context: ./django_app
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - chatbot
      - redis
    environment:
      - CHATBOT_API_URL=http://chatbot:8001
      - EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
    volumes:
      - ./django_app:/app
      - ./db.sqlite3:/app/db.sqlite3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"